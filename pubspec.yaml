name: cookies_shop
description: "A new Flutter project."

publish_to: 'none'


version: 1.0.0+1

environment:
  sdk: ^3.11.0-200.1.beta


dependencies:
  flutter:
    sdk: flutter
  bloc: ^9.2.0
  flutter_bloc:
  flutter_gen:
  google_fonts:
  animate_do:
  flutter_svg:
  carousel_slider:
  smooth_page_indicator:
  dotted_border:
  flutter_map:
  latlong2:
  cupertino_icons:
  readmore:

dev_dependencies:
  build_runner:
  flutter_gen_runner:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
flutter_gen:
  output: lib/core/gen/
  line_length: 80
flutter:

  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

